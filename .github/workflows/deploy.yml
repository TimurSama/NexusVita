name: Deploy Nexus Vita

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
        continue-on-error: true
      
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:3001' }}
      
      - name: Check Vercel secrets
        id: check-vercel
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "⚠️ Vercel secrets not configured. Skipping deployment."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Vercel secrets found"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Deploy to Vercel
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && steps.check-vercel.outputs.skip != 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./frontend
      
      - name: Vercel deployment skipped
        if: steps.check-vercel.outputs.skip == 'true'
        run: |
          echo "⚠️ Vercel deployment skipped - secrets not configured"
          echo "See GITHUB_ACTIONS_SETUP.md for instructions"

  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate Prisma Client
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "⚠️ DATABASE_URL not set, using dummy URL for Prisma generate"
            DATABASE_URL="postgresql://dummy:dummy@localhost:5432/dummy" npx prisma generate || echo "Prisma generate failed, continuing..."
          else
            npx prisma generate
          fi
        continue-on-error: true
      
      - name: Build
        run: npm run build
        continue-on-error: true
      
      - name: Deploy to Railway (optional)
        if: github.ref == 'refs/heads/main' && secrets.RAILWAY_TOKEN != ''
        run: |
          echo "Backend build completed. Configure Railway deployment separately."
          echo "See DEPLOYMENT.md for instructions."

  notify:
    runs-on: ubuntu-latest
    needs: [build-and-deploy-frontend, build-backend]
    if: always()
    steps:
      - name: Deployment status
        run: |
          echo "✅ Frontend deployment: ${{ needs.build-and-deploy-frontend.result }}"
          echo "✅ Backend build: ${{ needs.build-backend.result }}"

