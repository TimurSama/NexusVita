# Docker Compose для Nexus Vita
# ВАЖНО: Для локальной разработки и демо-презентации Docker НЕ требуется!
# Используйте: npm run dev (в корне проекта)
#
# Docker нужен только для production-развертывания или тестирования полной инфраструктуры
# Для демо-презентации инвесторам используйте локальную разработку

version: '3.8'

services:
  # PostgreSQL Database (опционально, можно использовать локальный PostgreSQL)
  postgres:
    image: postgres:15-alpine
    container_name: nexusvita-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexusvita
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexusvita-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - production

  # Redis Cache (опционально, можно использовать локальный Redis)
  redis:
    image: redis:7-alpine
    container_name: nexusvita-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nexusvita-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - production

  # API Backend (опционально, для локальной разработки используйте npm run dev)
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: nexusvita-api
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nexusvita?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key
      CLIENT_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexusvita-network
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    profiles:
      - production

  # Web Frontend (опционально, для локальной разработки используйте npm run dev)
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: nexusvita-web
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_WS_URL: ws://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - nexusvita-network
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:

networks:
  nexusvita-network:
    driver: bridge
